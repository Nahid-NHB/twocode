services:
  postgres:
    image: postgres:16-alpine
    container_name: twocode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: twocode
      POSTGRES_PASSWORD: twocode
      POSTGRES_DB: twocode
    ports:
      - "5432:5432"
    volumes:
      - twocode-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twocode -d twocode"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  twocode-postgres-data:
